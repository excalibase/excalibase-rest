# Excalibase REST API Configuration
server:
  port: 20000

spring:
  application:
    name: excalibase-rest
  threads:
    virtual:
      enabled: true  # Java 21 virtual threads for high-concurrency I/O
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/excalibase_rest
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/excalibase_rest_test
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # Jackson configuration for JSON processing
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

# Application-specific configuration
app:
  # Database configuration
  allowed-schema: public
  database-type: postgres

  # Pagination configuration
  max-page-size: 1000
  default-page-size: 100

  # Cache configuration
  schema-cache-ttl-seconds: 300 # 5 minutes
  permission-cache-ttl-seconds: 300 # 5 minutes - caches database permission checks

  # Query protection
  db-max-rows: 1000 # Maximum rows that can be requested per query
  
  # CORS configuration
  cors:
    enabled: true
    allowed-origins: 
      - "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: false
    max-age: 3600
  
  # Security configuration
  security:
    enable-sql-injection-protection: true
    enable-table-name-validation: true
    enable-column-name-validation: true
    max-request-body-size: 1048576 # 1MB
    max-query-complexity: 100

    # Row Level Security (RLS) configuration
    user-context-enabled: true      # Enable RLS support
    user-id-extractor-type: header  # Extractor type: "header", "jwt", "oauth2", etc.
    user-id-header: X-User-Id       # Header name for user ID when using header extractor
  
  # Query complexity limits
  query:
    max-complexity-score: 1000
    max-depth: 10
    max-breadth: 50
    complexity-analysis-enabled: true

  # NATS CDC configuration (connect to excalibase-watcher stream)
  nats:
    enabled: false                 # Enable to receive CDC events from excalibase-watcher
    url: nats://localhost:4222     # NATS server URL
    stream-name: CDC               # JetStream stream name
    subject-prefix: cdc            # Subject prefix used by excalibase-watcher

  # Aggregation configuration
  aggregates:
    enabled: true
    inline-enabled: true               # Enable inline aggregation: ?select=col.sum()
    dedicated-endpoint: true            # Enable /aggregate endpoint
    max-aggregates-per-query: 10
    default-functions: count,sum,avg,min,max

  # Computed fields configuration
  computed-fields:
    enabled: true
    auto-include: true                  # Auto-embed in responses
    cache-ttl-seconds: 300             # Cache computed field results
    max-per-query: 20                  # Max computed fields per request
    discovery-cache-ttl-seconds: 3600  # Cache function discovery results

  # RPC (Remote Procedure Call) configuration
  rpc:
    enabled: true
    allowed-functions: "*"             # "*" = all, or comma-separated list
    max-parameters: 50                 # Max function parameters
    timeout-seconds: 30                # Function execution timeout

# Logging configuration
logging:
  level:
    io.github.excalibase: INFO
    org.springframework.jdbc.core: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management endpoints (actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

# Application information
info:
  app:
    name: Excalibase REST API
    description: Auto-generated REST API for PostgreSQL databases
    version: 1.0.0
    github: https://github.com/excalibase/excalibase-rest