name: End-to-End Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  e2e-tests:
    name: End-to-End Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Download JAR artifacts (if from workflow_run)
      if: github.event_name == 'workflow_run'
      uses: actions/download-artifact@v4
      with:
        name: jar-artifacts
        path: modules/excalibase-rest-api/target/
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}

    - name: Install dependencies (required by make targets)
      run: |
        # Install docker-compose if missing (GitHub Actions has 'docker compose' but make uses 'docker-compose')
        if ! command -v docker-compose >/dev/null 2>&1; then
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
        fi

    - name: Install E2E test dependencies
      run: cd e2e && npm install

    - name: Run complete E2E test suite
      run: make ci

    - name: Upload application logs on failure
      if: failure()
      run: |
        echo "Collecting application logs..."
        docker-compose -f docker-compose.yml -p excalibase-rest-app logs app > app-logs.txt 2>&1 || true
        docker-compose -f docker-compose.yml -p excalibase-rest-app logs excalibase-watcher > watcher-logs.txt 2>&1 || true

    - name: Upload logs as artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-logs
        path: |
          app-logs.txt
          watcher-logs.txt
        retention-days: 3
        if-no-files-found: ignore
