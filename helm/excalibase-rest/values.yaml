# Default values for excalibase-rest

replicaCount: 1

image:
  repository: excalibase/excalibase-rest
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 20000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: excalibase-rest.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Database connection
# ---------------------------------------------------------------------------
database:
  url: ""
  username: ""
  password: ""

  existingSecret: ""
  existingSecretUsernameKey: "username"
  existingSecretPasswordKey: "password"

# ---------------------------------------------------------------------------
# Application settings
# ---------------------------------------------------------------------------
app:
  # Schema to expose via REST API
  allowedSchema: "public"

  # Database type (auto-detected from URL if empty)
  databaseType: "postgres"

  # Server port (must match service.port)
  port: 20000

  # OpenAPI server URL
  serverUrl: "https://api.excalibase.io"

  # Actuator base path (avoids collision with REST endpoints)
  actuatorBasePath: "/rest-actuator"

  # Pagination
  maxPageSize: 1000
  defaultPageSize: 100

  # NATS CDC subscription (events from excalibase-watcher)
  nats:
    enabled: false
    url: "nats://nats:4222"
    streamName: "CDC"
    subjectPrefix: "cdc"

# ---------------------------------------------------------------------------
# Connection pool (HikariCP)
# ---------------------------------------------------------------------------
hikari:
  maximumPoolSize: 20
  minimumIdle: 2
  connectionTimeout: 30000
  idleTimeout: 600000
  maxLifetime: 1800000

# ---------------------------------------------------------------------------
# Tomcat tuning
# ---------------------------------------------------------------------------
tomcat:
  threadsMax: 200
  threadsMinSpare: 10
  maxConnections: 8192
  acceptCount: 100
  connectionTimeout: 20000

# Enable Java 21 virtual threads
virtualThreads:
  enabled: true

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# Liveness / readiness probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /rest-actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /rest-actuator/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Extra env vars
# ---------------------------------------------------------------------------
extraEnv: []
# - name: LOGGING_LEVEL_IO_GITHUB_EXCALIBASE
#   value: DEBUG

extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
